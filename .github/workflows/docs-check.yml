name: Docs Check

on:
  push:
    paths:
      - 'examples/**'
      - '*.md'
      - '*.mdx'
      - '.editorconfig'
      - '.gitignore'
      - '.github/workflows/**'
      - 'src/**'
      - 'scripts/**'
      - 'test/**'
      - 'action/**'
      - 'package.json'
  pull_request:
    paths:
      - 'examples/**'
      - '*.md'
      - '*.mdx'
      - '.editorconfig'
      - '.gitignore'
      - '.github/workflows/**'
      - 'src/**'
      - 'scripts/**'
      - 'test/**'
      - 'action/**'
      - 'package.json'

jobs:
  guardrail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install action dependencies
        working-directory: action
        run: npm ci --no-audit --no-fund
      - name: Verify action bundle parity
        working-directory: action
        run: |
          npm run build
          git diff --exit-code -- dist/index.mjs dist/licenses.txt
      - name: Audit action dependency chain
        working-directory: action
        run: npm audit --omit=dev
      - name: Run test suite
        run: npm test
      - name: Verify docs sync
        run: npm run docs:sync-check
      - name: Verify npm package contents
        run: npm pack --dry-run
      - name: Docs quality gate
        run: node ./src/index.mjs README.md --strict --report report.md
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: guardrail-report
          path: report.md
