name: Docs Check

on:
  push:
    paths:
      - 'docs/**/*.md'
      - '*.md'
      - 'src/**'
      - 'test/**'
      - 'action/**'
      - 'package.json'
  pull_request:
    paths:
      - 'docs/**/*.md'
      - '*.md'
      - 'src/**'
      - 'test/**'
      - 'action/**'
      - 'package.json'

jobs:
  guardrail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Install action dependencies
        working-directory: action
        run: npm install --no-audit --no-fund
      - name: Audit action dependency chain
        working-directory: action
        run: npm audit --omit=dev
      - name: Run test suite
        run: npm test
      - name: Docs quality gate
        run: node ./src/index.mjs docs/ --strict --exclude examples --report report.md
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: guardrail-report
          path: report.md
