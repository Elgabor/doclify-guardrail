name: 'Doclify Guardrail'
description: 'Quality gate for Markdown documentation. Lint, score, and enforce doc quality in your CI pipeline.'
author: 'Elgabor'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Single scan target: file, directory, or glob'
    default: '.'
  strict:
    description: 'Treat warnings as errors'
    default: 'false'
  min-score:
    description: 'Fail if health score is below this value (0-100)'
    default: ''
  check-links:
    description: 'Validate HTTP and local links'
    default: 'false'
  check-freshness:
    description: 'Check document freshness via frontmatter dates'
    default: 'false'
  check-frontmatter:
    description: 'Require YAML frontmatter block'
    default: 'false'
  ai-drift:
    description: 'Run Drift Guard alongside the standard scan'
    default: 'false'
  ai-mode:
    description: 'Drift Guard mode: offline or cloud'
    default: 'offline'
  fail-on-drift:
    description: 'Fail if drift risk reaches this threshold (high or medium)'
    default: ''
  fail-on-drift-scope:
    description: 'Drift gate scope: unmodified docs only or all docs'
    default: 'unmodified'
  api-url:
    description: 'Doclify Cloud API base URL override'
    default: ''
  doclify-token:
    description: 'Doclify Cloud API key used for AI features'
    default: ''
  push:
    description: 'Push score summary to Doclify Cloud'
    default: 'false'
  project-id:
    description: 'Doclify Cloud project id used for score push'
    default: ''
  format:
    description: 'Output format: default, compact'
    default: 'compact'
  sarif:
    description: 'Generate SARIF report for GitHub Code Scanning'
    default: 'true'
  sarif-file:
    description: 'SARIF output file path'
    default: 'doclify.sarif'
  pr-comment:
    description: 'Post quality report as PR comment'
    default: 'true'
  token:
    description: 'GitHub token for PR comments'
    default: ${{ github.token }}

outputs:
  score:
    description: 'Average health score (0-100)'
  status:
    description: 'PASS or FAIL'
  errors:
    description: 'Total error count'
  warnings:
    description: 'Total warning count'

runs:
  using: 'node20'
  main: 'dist/index.mjs'
